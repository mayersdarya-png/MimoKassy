# Бронь и её представления.

components:
  schemas:
    BookingStatus:
      type: string
      description: |
        Статус брони.
        late_cancel — поздняя отмена (менее 24 часов до начала): место и экипировка НЕ освобождаются.
        studio_cancelled — «Отменена студией»: слот снят студией, бронь отменена не по инициативе клиента.
      enum:
        - active
        - cancelled
        - late_cancel
        - studio_cancelled

    CreateBookingRequest:
      type: object
      description: Запрос на создание брони.
      required:
        - slot_id
        - seats_count
        - rental_count
      properties:
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота.
        seats_count:
          type: integer
          description: Число мест (1–3: себя + до 2 гостей).
          minimum: 1
          maximum: 3
          example: 2
        rental_count:
          type: integer
          description: Число прокатных комплектов экипировки. Не больше seats_count.
          minimum: 0
          maximum: 3
          example: 1
        allergy_comment:
          type: string
          description: Комментарий про аллергии и особенности питания (опционально, до ~500 символов).
          maxLength: 500
          example: Без орехов

    Booking:
      type: object
      description: Полные данные брони для экрана деталей (SCR-006).
      required:
        - id
        - slot_id
        - client_id
        - seats_count
        - rental_count
        - status
        - price_total
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор брони.
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота, на который оформлена бронь.
        client_id:
          type: string
          format: uuid
          description: Идентификатор клиента, оформившего бронь.
        seats_count:
          type: integer
          description: Число забронированных мест.
          minimum: 1
          maximum: 3
          example: 2
        rental_count:
          type: integer
          description: Число прокатных комплектов экипировки (0..seats_count).
          minimum: 0
          maximum: 3
          example: 1
        status:
          $ref: '#/components/schemas/BookingStatus'
        price_total:
          type: integer
          description: |
            Производное поле только для чтения, в рублях (валюта RUB).
            = slot.price * seats_count + slot.rental_price * rental_count.
            Сами тарифы price/rental_price берутся из booking.slot.
          readOnly: true
          example: 6500
        allergy_comment:
          type: string
          nullable: true
          description: Комментарий про аллергии.
          example: Без орехов
        created_at:
          type: string
          format: date-time
          description: Дата и время создания брони.
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отмены, если бронь была отменена.
        cancellation_reason:
          type: string
          nullable: true
          readOnly: true
          description: |
            Причина отмены брони. Заполняется при studio_cancelled.
            Для cancelled/late_cancel и active — null.
          example: Отмена из-за срыва поставки продуктов
        slot:
          $ref: '../slots/models.yaml#/components/schemas/Slot'

    CreateBookingResponse:
      type: object
      description: |
        Ответ на создание брони. Полные данные брони (как Booking) плюс
        признак первой брони клиента и параметры напоминания.
      allOf:
        - $ref: '#/components/schemas/Booking'
        - type: object
          required:
            - is_first_booking
          properties:
            is_first_booking:
              type: boolean
              description: true, если это первая успешная бронь клиента.
              example: true
            reminder_hours:
              type: array
              description: |
                За сколько часов до старта слота клиенту будут отправлены напоминания (push).
                MVP-набор — [24, 2] (за 24 ч и за 2 ч до старта).
              items:
                type: integer
              example: [24, 2]

    BookingSummary:
      type: object
      description: Урезанное представление брони для списка (SCR-005).
      required:
        - id
        - slot_id
        - seats_count
        - rental_count
        - status
        - price_total
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор брони.
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота.
        seats_count:
          type: integer
          description: Число забронированных мест.
          minimum: 1
          maximum: 3
          example: 2
        rental_count:
          type: integer
          description: Число прокатных комплектов.
          minimum: 0
          maximum: 3
          example: 1
        status:
          $ref: '#/components/schemas/BookingStatus'
        price_total:
          type: integer
          description: Итоговая цена в рублях.
          readOnly: true
          example: 6500
        created_at:
          type: string
          format: date-time
          description: Дата и время создания брони.
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отмены.
        cancellation_reason:
          type: string
          nullable: true
          readOnly: true
          description: Причина отмены (для studio_cancelled).
        slot:
          $ref: '../slots/models.yaml#/components/schemas/SlotSummary'

    BookingListResponse:
      type: object
      description: Постраничный список броней (SCR-005).
      required:
        - items
        - meta
      properties:
        items:
          type: array
          description: Элементы списка броней.
          items:
            $ref: '#/components/schemas/BookingSummary'
        meta:
          $ref: '../common/models.yaml#/components/schemas/PaginationMeta'
